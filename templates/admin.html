<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
<h2>Painel Admin</h2>

<form method="POST">
    <input name="nome" placeholder="Nome do produto">
    <input name="preco" placeholder="Preço">
    <input name="imagem" placeholder="URL da imagem">
    <button type="submit">Adicionar</button>
</form>

<hr>

{% for p in produtos %}
    <div class="produto">
        <img src="{{ p.imagem }}" width="100%">
        <h3>{{ p.nome }}</h3>
        <p>R$ {{ p.preco }}</p>
    </div>
{% endfor %}
