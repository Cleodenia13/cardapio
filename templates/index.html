<!DOCTYPE html>
<html>
<head>
    <title>Cardápio</title>
    <style>
        body {
            font-family: Arial;
            background: #f5f5f5;
            padding: 20px;
        }

        h1 {
            text-align: center;
        }

        .card {
            background: white;
            padding: 15px;
            margin: 10px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        button {
            background: green;
            color: white;
            border: none;
            padding: 8px;
            border-radius: 5px;
            cursor: pointer;
        }

        #carrinho {
            position: fixed;
            right: 20px;
            top: 20px;
            background: white;
            padding: 15px;
            border-radius: 10px;
            width: 250px;
        }
    </style>
</head>

<body>

<h1>🍔 Cardápio da Lanchonete</h1>

<div id="carrinho">
    <h3>🛒 Carrinho</h3>
    <ul id="lista"></ul>
    <p><b>Total: R$ <span id="total">0</span></b></p>

    <input type="text" id="nome" placeholder="Seu nome"><br><br>
    <input type="text" id="endereco" placeholder="Endereço"><br><br>

    <button onclick="enviarPedido()">Enviar Pedido</button>
</div>

{% for item in cardapio %}
<div class="card">
    <h3>{{ item.nome }}</h3>
    <p>R$ {{ item.preco }}</p>
    <button onclick="addItem('{{ item.nome }}', {{ item.preco }})">Adicionar</button>
</div>
{% endfor %}

<script>
let carrinho = [];
let total = 0;

function addItem(nome, preco) {
    carrinho.push(nome);
    total += preco;

    let lista = document.getElementById("lista");
    let item = document.createElement("li");
    item.innerText = nome;
    lista.appendChild(item);

    document.getElementById("total").innerText = total;
}

function enviarPedido() {
    let nome = document.getElementById("nome").value;
    let endereco = document.getElementById("endereco").value;

    let mensagem = "Pedido:%0A";

    carrinho.forEach(item => {
        mensagem += "- " + item + "%0A";
    });

    mensagem += "%0ATotal: R$ " + total;
    mensagem += "%0ACliente: " + nome;
    mensagem += "%0AEndereço: " + endereco;

    let numero = "5585987235195"; // SEU NÚMERO

    window.open(`https://wa.me/${numero}?text=${mensagem}`);
}
</script>

</body>
</html>
