<!DOCTYPE html>
<html>
<head>
    <title>Cardápio</title>
    <style>
        body {
            font-family: Arial;
            background: #f5f5f5;
            margin: 0;
        }

        .header {
            background: #ff3b3b;
            color: white;
            padding: 15px;
            text-align: center;
        }

        .container {
            padding: 15px;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 10px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        img {
            width: 80px;
            height: 80px;
            border-radius: 10px;
            object-fit: cover;
        }

        .info {
            flex: 1;
        }

        .preco {
            color: green;
            font-weight: bold;
        }

        button {
            background: #25D366;
            color: white;
            border: none;
            padding: 8px;
            border-radius: 8px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="header">
    <h2>🍔 Meu Cardápio</h2>
    <p>📞 WhatsApp: (85) 99999-9999</p>
<p>💳 Pix: seuemail@gmail.com</p>
</div>

<div class="container">

{% if produtos %}
    {% for item in produtos %}
    <div class="card">
        <img src="{{ item.imagem }}">
        <div class="info">
            <h3>{{ item.nome }}</h3>
            <p class="preco">R$ {{ item.preco }}</p>
        </div>

        <button onclick="pedir('{{ item.nome }}', '{{ item.preco }}')">
            Pedir
        </button>
    </div>
    {% endfor %}
{% else %}
    <p>Sem produtos cadastrados</p>
{% endif %}

</div>

<script>
function pedir(nome, preco) {
    let numero = "5585987235195"; // 🔥 COLOCA SEU WHATSAPP AQUI

    let msg = `Olá, quero pedir:\n\n${nome} - R$ ${preco}`;

    let url = `https://wa.me/${numero}?text=${encodeURIComponent(msg)}`;

    window.open(url, "_blank");
}
</script>

</body>
</html>
