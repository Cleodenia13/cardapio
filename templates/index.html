<!DOCTYPE html>
<html>
<head>
    <title>Cardápio</title>
    <style>
        body {
            font-family: Arial;
            background: #f2f2f2;
            margin: 0;
        }

        header {
            background: #ff3d00;
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 22px;
        }

        .container {
            display: grid;
            grid-template-columns: 1fr 300px;
        }

        .produtos {
            padding: 20px;
        }

        .card {
            background: white;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .info h3 {
            margin: 0;
        }

        .preco {
            color: green;
            font-weight: bold;
        }

        .controle button {
            padding: 5px 10px;
            margin: 2px;
            border: none;
            background: #ff3d00;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        .carrinho {
            background: white;
            padding: 20px;
            border-left: 2px solid #ddd;
        }

        .carrinho h2 {
            margin-top: 0;
        }

        .item {
            display: flex;
            justify-content: space-between;
        }

        input {
            width: 100%;
            padding: 8px;
            margin-top: 10px;
        }

        .btn-finalizar {
            background: green;
            color: white;
            width: 100%;
            padding: 10px;
            border: none;
            margin-top: 15px;
            cursor: pointer;
            border-radius: 5px;
        }
    </style>
</head>

<body>

<header>🍔 Cardápio Digital</header>

<div class="container">

    <div class="produtos">
        {% for item in cardapio %}
        <div class="card">
            <div class="info">
                <h3>{{ item.nome }}</h3>
                <p class="preco">R$ {{ item.preco }}</p>
            </div>

            <div class="controle">
                <button onclick="remover('{{ item.nome }}', {{ item.preco }})">-</button>
                <button onclick="adicionar('{{ item.nome }}', {{ item.preco }})">+</button>
            </div>
        </div>
        {% endfor %}
    </div>

    <div class="carrinho">
        <h2>🛒 Pedido</h2>
        <div id="itens"></div>

        <p><b>Total: R$ <span id="total">0</span></b></p>

        <input type="text" id="nome" placeholder="Seu nome">
        <input type="text" id="endereco" placeholder="Endereço">

        <button class="btn-finalizar" onclick="enviarPedido()">Finalizar Pedido</button>
    </div>

</div>

<script>
let carrinho = {};
let total = 0;

function atualizarCarrinho() {
    let div = document.getElementById("itens");
    div.innerHTML = "";

    for (let item in carrinho) {
        let linha = document.createElement("div");
        linha.className = "item";
        linha.innerHTML = item + " x" + carrinho[item].qtd;
        div.appendChild(linha);
    }

    document.getElementById("total").innerText = total;
}

function adicionar(nome, preco) {
    if (!carrinho[nome]) {
        carrinho[nome] = {qtd: 0, preco: preco};
    }
    carrinho[nome].qtd++;
    total += preco;

    atualizarCarrinho();
}

function remover(nome, preco) {
    if (carrinho[nome] && carrinho[nome].qtd > 0) {
        carrinho[nome].qtd--;
        total -= preco;

        if (carrinho[nome].qtd === 0) {
            delete carrinho[nome];
        }

        atualizarCarrinho();
    }
}

function enviarPedido() {
    let nome = document.getElementById("nome").value;
    let endereco = document.getElementById("endereco").value;

    let mensagem = "Pedido:%0A";

    for (let item in carrinho) {
        mensagem += item + " x" + carrinho[item].qtd + "%0A";
    }

    mensagem += "%0ATotal: R$ " + total;
    mensagem += "%0ACliente: " + nome;
    mensagem += "%0AEndereço: " + endereco;

    let numero = "5585981234567"; // COLOCA SEU NÚMERO

    window.open(`https://wa.me/${numero}?text=${mensagem}`);
}
</script>

</body>
</html>
